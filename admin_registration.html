<!DOCTYPE html>
<html>
<head>
<title>Admin Registration</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;

background-image:url("https://images.pexels.com/photos/669615/pexels-photo-669615.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

height:100vh;
}

/* HEADER */

.header{
background:#2e7d32;
color:white;
padding:15px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.home-btn{
position:absolute;
left:20px;
background:white;
color:#2e7d32;
padding:6px 14px;
text-decoration:none;
border-radius:5px;
font-weight:bold;
}

.home-btn:hover{
background:#e8f5e9;
}

/* FORM CONTAINER */

.container{
background:rgba(0,0,0,0.6);
color:white;

width:350px;
margin:auto;
margin-top:120px;

padding:35px;
border-radius:10px;
text-align:center;

backdrop-filter:blur(6px);
}

/* INPUT */

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

/* BUTTON */

button{
padding:10px 20px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#1b5e20;
}

</style>

</head>

<body>

<div class="header">

<a href="index.html" class="home-btn">Home</a>

<h2>Admin Registration</h2>

</div>

<div class="container">

<h3>Create Admin Account</h3>

<form action="php/admin_registration.php" method="POST">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<br><br>

<button type="submit">Register Admin</button>

</form>

</div>

</body>
</html>
